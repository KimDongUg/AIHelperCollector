<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Helper 수집기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    user-select: none;
  }
  .header {
    background: linear-gradient(135deg, #1565c0, #0d47a1);
    color: white;
    padding: 20px 24px 16px;
    text-align: center;
  }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
  .body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }

  .card {
    background: white;
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .card-label {
    font-size: 11px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .btn {
    padding: 9px 16px;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #1565c0; color: white; }
  .btn-primary:not(:disabled):hover { background: #0d47a1; }
  .btn-success { background: #2e7d32; color: white; width: 100%; padding: 12px; font-size: 14px; }
  .btn-success:not(:disabled):hover { background: #1b5e20; }
  .btn-danger { background: #c62828; color: white; width: 100%; padding: 12px; font-size: 14px; }
  .btn-danger:not(:disabled):hover { background: #b71c1c; }
  .btn-outline { background: white; color: #1565c0; border: 1.5px solid #1565c0; }
  .btn-outline:not(:disabled):hover { background: #e3f2fd; }
  .btn-gray { background: #f5f5f5; color: #555; border: 1px solid #ddd; }
  .btn-gray:not(:disabled):hover { background: #eeeeee; }

  /* ERP 연결 카드 */
  .erp-btns { display: flex; gap: 8px; margin-bottom: 10px; }
  .erp-btns .btn { flex: 1; }
  .port-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  .port-label { font-size: 12px; color: #888; white-space: nowrap; flex-shrink: 0; }
  .port-input {
    width: 80px;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
  }
  .port-input:focus { border-color: #1565c0; }

  .connect-status {
    margin-top: 10px;
    padding: 9px 12px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    display: none;
  }
  .connect-status.success { background: #e8f5e9; color: #2e7d32; display: block; }
  .connect-status.error   { background: #ffebee; color: #c62828; display: block; }
  .connect-status.warning { background: #fff3e0; color: #e65100; display: block; }

  .hint {
    font-size: 11.5px;
    color: #888;
    margin-top: 8px;
    line-height: 1.5;
  }

  /* Progress */
  .progress-section { display: none; }
  .progress-section.visible { display: block; }
  .progress-bar-wrap {
    background: #e8eaf6;
    border-radius: 8px;
    height: 10px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #1565c0, #42a5f5);
    border-radius: 8px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #555;
    margin-bottom: 6px;
  }
  .progress-pct { font-weight: 700; color: #1565c0; font-size: 14px; }
  .current-unit { font-size: 12.5px; color: #333; margin-top: 4px; }

  /* Result */
  .result-section { display: none; }
  .result-section.visible { display: block; }
  .result-btns { display: flex; gap: 8px; }
  .result-btns .btn { flex: 1; }

  /* Status */
  .status-bar {
    background: white;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12.5px;
    color: #555;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #9e9e9e;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.green  { background: #43a047; }
  .status-dot.blue   { background: #1565c0; animation: pulse 1.2s infinite; }
  .status-dot.red    { background: #e53935; }
  .status-dot.orange { background: #fb8c00; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .fail-section { display: none; margin-top: 10px; }
  .fail-section.visible { display: block; }
  .fail-list {
    background: #fff8e1;
    border: 1px solid #ffe082;
    border-radius: 7px;
    padding: 10px 12px;
    font-size: 12px;
    color: #5d4037;
    max-height: 90px;
    overflow-y: auto;
    line-height: 1.7;
  }
</style>
</head>
<body>

<div class="header">
  <h1>AI Helper 수집기</h1>
  <p>부과내역서 엑셀데이터 자동 생성기 v5.7.0</p>
</div>

<div class="body">

  <!-- ERP 연결 -->
  <div class="card">
    <div class="card-label">ERP 연결</div>

    <div class="url-row" style="display:flex; gap:8px; margin-bottom:10px">
      <input class="url-input" id="erpUrl" type="text" placeholder="비워두세요 — Aegis 런처가 XpERP를 자동으로 엽니다" style="flex:1; border:1px solid #ddd; border-radius:6px; padding:8px 10px; font-size:13px; font-family:inherit; outline:none; color:#aaa;" />
    </div>

    <div class="erp-btns">
      <button class="btn btn-outline" id="btnOpenErpBrowser">ERP 열기</button>
      <button class="btn btn-primary" id="btnConnectERP">ERP 브라우저 연결</button>
    </div>

    <div class="port-row">
      <span class="port-label">CDP 포트</span>
      <input class="port-input" id="cdpPort" type="number" value="9222" min="1024" max="65535" />
    </div>

    <div class="connect-status" id="connectStatus"></div>

    <p class="hint">XpERP에서 먼저 수동으로 조회 완료 후 수집 시작하세요.<br>① 입주자현황 → 개인정보 표시 ✓ → 조회<br>② 관리비조회 → 조회 (동호내역 목록 표시)<br>③ [수집 시작] 클릭</p>
  </div>

  <!-- 수집 제어 -->
  <div class="card">
    <div class="card-label">수집 제어</div>
    <button class="btn btn-success" id="btnStart" disabled>수집 시작</button>
    <button class="btn btn-danger" id="btnStop" disabled style="margin-top:8px; display:none">수집 중단</button>

    <!-- 진행률 -->
    <div class="progress-section" id="progressSection" style="margin-top:14px">
      <div class="progress-info">
        <span id="progressCount">0 / 0 세대</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="current-unit" id="currentUnit">준비 중...</div>
    </div>
  </div>

  <!-- 결과 -->
  <div class="card result-section" id="resultSection">
    <div class="card-label">수집 완료</div>
    <div class="result-btns" style="margin-bottom:8px">
      <button class="btn btn-outline" id="btnOpenExcel">엑셀 열기</button>
      <button class="btn btn-gray" id="btnOpenLogs">로그 보기</button>
    </div>
    <button class="btn btn-primary" id="btnUpload" style="width:100%">AI Helper 업로드</button>
    <div class="fail-section" id="failSection">
      <div style="font-size:12px; color:#e65100; margin:8px 0 4px; font-weight:600" id="failTitle"></div>
      <div class="fail-list" id="failList"></div>
    </div>
  </div>

  <!-- 상태 -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">준비</span>
  </div>

</div>

<script src="renderer.js"></script>
</body>
</html>
